name: Daily Crude Oil Agent

on:
  schedule:
    - cron: '0 1 * * *'  # Runs every day at 01:00 UTC (09:00 Taipei time)
  workflow_dispatch:      # Also allows manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Cache pip packages — keyed to requirements.txt so it auto-invalidates when deps change
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      # Cache Playwright browser — only re-downloads when playwright version changes
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Only install browser if not found in cache
      - name: Install Playwright browser
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install chromium --with-deps

      # Restore SQLite DB and scraped files from previous run
      - name: Restore agent data
        uses: actions/cache@v4
        with:
          path: |
            data.db
            scraped/
          key: agent-data-${{ runner.os }}
          restore-keys: |
            agent-data-

      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_TO: ${{ secrets.GMAIL_TO }}
          GMAIL_EMILY: ${{ secrets.GMAIL_EMILY }}
        run: python main.py

      # Save updated DB and scraped files for next run
      - name: Save agent data
        uses: actions/cache@v4
        with:
          path: |
            data.db
            scraped/
          key: agent-data-${{ runner.os }}